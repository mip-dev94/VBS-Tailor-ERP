name: Deploy to VBS Tailor ERP VM

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_all:
        description: 'Force upgrade tất cả modules (dùng khi cần import lại translations)'
        type: boolean
        default: false

concurrency:
  group: deploy-vm
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH and run update.sh
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: 22
          script_stop: true
          command_timeout: 30m
          script: |
            REPO="$HOME/ERP_Fashion"
            cd "$REPO"
            rm -f .git/index.lock .git/config.lock .git/HEAD.lock 2>/dev/null || true
            git checkout -- odoo.conf.docker 2>/dev/null || true
            echo "=== pre-flight ==="
            bash -c 'echo bash_ok'
            test -f "$REPO/deploy/update.sh" && echo "update.sh: EXISTS" || echo "update.sh: NOT FOUND"
            test -r "$REPO/deploy/update.sh" && echo "update.sh: READABLE" || echo "update.sh: NOT READABLE"
            file "$REPO/deploy/update.sh" || true
            echo "=== run ==="
            FORCE="${{ github.event.inputs.force_all }}"
            if [ "$FORCE" = "true" ]; then
              bash "$REPO/deploy/update.sh" all 2>&1 || echo "EXIT_CODE=$?"
            else
              bash "$REPO/deploy/update.sh" 2>&1 || echo "EXIT_CODE=$?"
            fi
