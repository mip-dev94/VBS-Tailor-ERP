name: Deploy to VBS Tailor ERP VM

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_all:
        description: 'Force upgrade tất cả modules (dùng khi cần import lại translations)'
        type: boolean
        default: false

concurrency:
  group: deploy-vm
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH and run update.sh
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: 22
          script_stop: true
          command_timeout: 30m
          script: |
            echo ">>> whoami: $(whoami)"
            echo ">>> HOME: $HOME"
            echo ">>> pwd: $(pwd)"
            echo ">>> ls ~: $(ls ~ | head -5)"
            echo ">>> cd ERP_Fashion..."
            cd ~/ERP_Fashion
            echo ">>> pwd after cd: $(pwd)"
            git checkout -- odoo.conf.docker 2>/dev/null || true
            echo ">>> git status:"
            git status --short
            if [ "${{ github.event.inputs.force_all }}" = "true" ]; then
              bash deploy/update.sh all
            else
              bash deploy/update.sh
            fi
