name: Deploy to VBS Tailor ERP VM

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_all:
        description: 'Force upgrade tất cả modules (dùng khi cần import lại translations)'
        type: boolean
        default: false

concurrency:
  group: deploy-vm
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH and run update.sh
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: 22
          script_stop: true
          command_timeout: 30m
          script: |
            set -e
            REPO="$HOME/ERP_Fashion"
            echo "[1] cd $REPO"
            cd "$REPO"
            echo "[2] remove git locks"
            rm -f .git/index.lock .git/config.lock .git/HEAD.lock || true
            echo "[3] git checkout odoo.conf.docker"
            git checkout -- odoo.conf.docker || true
            echo "[4] running update.sh"
            FORCE="${{ github.event.inputs.force_all }}"
            if [ "$FORCE" = "true" ]; then
              bash "$REPO/deploy/update.sh" all
            else
              bash "$REPO/deploy/update.sh"
            fi
