name: Set Admin Password

on:
  workflow_dispatch:
    inputs:
      new_password:
        description: 'Password mới cho admin (tối thiểu 8 ký tự)'
        required: true

jobs:
  set-password:
    runs-on: ubuntu-latest
    steps:
      - name: SSH và reset admin password
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: 22
          script_stop: true
          command_timeout: 2m
          envs: NEW_PASSWORD
          script: |
            cd ~/ERP_Fashion
            COMPOSE="docker compose -f docker-compose.yml -f deploy/docker-compose.prod.yml"
            cat deploy/set_admin_password.py | $COMPOSE exec -T -e NEW_PASSWORD="$NEW_PASSWORD" odoo python3 -
        env:
          NEW_PASSWORD: ${{ github.event.inputs.new_password }}
