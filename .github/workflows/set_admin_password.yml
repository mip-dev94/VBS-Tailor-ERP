name: Set Admin Password

on:
  workflow_dispatch:
    inputs:
      new_password:
        description: 'Password mới cho admin (tối thiểu 8 ký tự)'
        required: true

jobs:
  set-password:
    runs-on: ubuntu-latest
    steps:
      - name: SSH và reset admin password
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: 22
          script_stop: true
          command_timeout: 2m
          envs: NEW_PASSWORD
          script: |
            cd ~/ERP_Fashion
            COMPOSE="docker compose -f docker-compose.yml -f deploy/docker-compose.prod.yml"
            $COMPOSE exec -T odoo python3 - <<PYEOF
import sys
sys.argv = ['odoo', '-c', '/etc/odoo/odoo.conf']
import odoo
from odoo.tools import config
config.parse_config(sys.argv[1:])
from odoo.modules.registry import Registry
import os

registry = Registry('VBS_ERP')
with registry.cursor() as cr:
    from odoo import api, SUPERUSER_ID
    env = api.Environment(cr, SUPERUSER_ID, {})
    Users = env['res.users']
    new_pw = os.environ.get('NEW_PASSWORD', '')
    if len(new_pw) < 8:
        print('ERROR: Password phải có ít nhất 8 ký tự')
        sys.exit(1)
    hashed = Users._crypt_context().hash(new_pw)
    Users._set_encrypted_password(2, hashed)
    admin = env['res.users'].browse(2)
    cr.commit()
    print(f'OK: Password của [{admin.login}] đã được đặt thành công')
PYEOF
        env:
          NEW_PASSWORD: ${{ github.event.inputs.new_password }}
