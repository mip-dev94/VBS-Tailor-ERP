services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-odoo_secret_2026}
    volumes:
      - db-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odoo"]
      interval: 10s
      timeout: 5s
      retries: 5

  odoo:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${ODOO_PORT:-8069}:8069"
    environment:
      HOST: db
      PORT: 5432
      USER: odoo
      PASSWORD: ${POSTGRES_PASSWORD:-odoo_secret_2026}
    volumes:
      - odoo-data:/var/lib/odoo
      - ./odoo.conf.docker:/etc/odoo/odoo.conf:ro
      - ./vbs_erp:/mnt/extra-addons/vbs_erp:ro
      - ./vbs_planning:/mnt/extra-addons/vbs_planning:ro
    restart: unless-stopped

volumes:
  db-data:
  odoo-data:
